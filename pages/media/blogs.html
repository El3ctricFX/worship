  <style>
    .sub-nav {
      background: #ffffff;
      border-bottom: 1px solid #f0e3d0;
      padding: 0.5rem 2rem;
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .sub-nav a {
      color: #8b6b44;
      text-decoration: none;
      font-weight: 500;
      padding: 0.3rem 0.5rem;
      border-bottom: 2px solid transparent;
    }
    .sub-nav a:hover, .sub-nav a.active {
      color: #c49a2b;
      border-bottom-color: #c49a2b;
    }
    .blog-list {
      list-style: none;
      padding: 0;
      margin: 2rem;
    }
    .blog-list li {
      background: #ffffff;
      border-radius: 16px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 0.5rem;
      border: 1px solid #f0e3d0;
      transition: 0.2s;
    }
    .blog-list li:hover {
      background: #fef8ef;
      border-color: #c49a2b;
    }
    .blog-list a {
      text-decoration: none;
      color: #c49a2b;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .blog-list a i {
      font-size: 1.1rem;
      width: 1.4rem;
      color: #c49a2b;
    }
    .inner-hero .hero-image {
      background-color: #d9c5a7;
    }
    @media (max-width: 680px) {
      .sub-nav { gap: 1rem; padding: 0.5rem 1rem; }
      .blog-list { margin: 1rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-flex">
      <div class="logo">
        <a href="../../index.html">
          <i class="fa-solid fa-cross"></i> WORSHIP<span>✦</span>
        </a>
      </div>
      <nav>
        <ul class="nav">
          <li><a href="../bibleverses.html"><i class="fa-solid fa-book-bible"></i> Verses</a></li>

          <li><a href="../resources.html"><i class="fa-solid fa-link"></i> Resources</a></li>
        </ul>
      </nav>
      <div class="shortcut-pill">⌨️ 1 (home) | ESC</div>

  <div class="sub-nav">
    <a href="../resources.html">📖 Resources</a>
    <a href="../communities.html">👥 Communities</a>
    <a href="../media.html" class="active">🎬 Media</a>
  </div>

  <section class="inner-hero">
    <div class="hero-image">
      <img src="https://images.pexels.com/photos/261763/pexels-photo-261763.jpeg?auto=compress&cs=tinysrgb&w=1600" alt="Blog writing" onerror="this.style.display='none';">
      <div class="hero-overlay"></div>
    </div>
    <div class="hero-caption">
      <h1><i class="fa-regular fa-newspaper"></i> Blogs</h1>
      <p>Faith articles & devotionals</p>
    </div>

    <h2>📝 Recommended Blogs</h2>
    <ul class="blog-list">
      <li><a href="https://blog.bible/bible-blog/" target="_blank"><i class="fa-solid fa-book"></i> Bible Blog</a></li>

  <script>
    (function() {
      function shortcuts(e) {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (e.key === '1' || e.key === 'Escape') location.href = '../../index.html';
      }
      document.addEventListener('keydown', shortcuts);
    })();
  </script>
